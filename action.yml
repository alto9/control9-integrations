name: Control9 Infrastructure Governance
description: Build redacted, signed action envelopes from IaC artifacts and request Control9 policy decisions.
author: Alto9

branding:
  icon: shield
  color: blue

inputs:
  mode:
    description: Runtime mode. Shadow mode reports findings without blocking deploys.
    required: false
    default: shadow
  control9-api-url:
    description: Control9 policy API base URL.
    required: true
  tenant-id:
    description: Control9 tenant or installation identity.
    required: true
  signing-secret:
    description: Secret used to sign action envelopes before submission.
    required: true
  target-environment:
    description: Governed environment key for this change (for example staging or production).
    required: true
  requested-authority:
    description: Deploy or change authority requested by this workflow step.
    required: true
  iac-tool:
    description: IaC tool that produced the artifacts (terraform, opentofu, cdk, or cloudformation).
    required: true
  command:
    description: Command category for the supplied artifacts (plan, synth, diff, or deploy-verification).
    required: true
  artifact-paths:
    description: Comma-separated paths to plan JSON, synthesized templates, or diff artifacts relative to working-directory.
    required: true
  working-directory:
    description: Repository-relative directory containing artifact paths.
    required: false
    default: .
  redaction-profile:
    description: Optional redaction profile name. Defaults to the standard Control9 profile when omitted.
    required: false
  redaction-additional-patterns:
    description: Optional comma-separated extra redaction patterns applied before envelope construction.
    required: false
  fail-open-environments:
    description: Optional comma-separated target-environment keys that may continue the workflow when the Control9 API is unavailable, even if mode is enforce. Values are trimmed and lowercased at parse time. Omitted or empty means every enforce run is treated as a protected enforce target for API failure purposes.
    required: false

outputs:
  envelope-id:
    description: Control9 envelope identifier after successful submission.
  artifact-fingerprint:
    description: Stable fingerprint for the normalized artifact content.
  decision-id:
    description: Control9 policy decision identifier.
  decision-kind:
    description: Normalized decision kind (allow, deny, require_approval, observe) or failure sentinel (unavailable_api, timeout, malformed_response).
  verification-id:
    description: Control9 deploy verification identifier when command is deploy-verification.
  verification-status:
    description: Normalized deploy verification status (verified, fingerprint_mismatch, no_approved_baseline) or failure sentinel (unavailable_api, timeout, malformed_response).
  summary-path:
    description: Path to the local summary JSON written for workflow rendering.
  summary-written:
    description: Whether the GitHub workflow step summary received the Control9 decision section.
  pr-comment-state:
    description: Pull request comment publish state when PR comment rendering is enabled.

runs:
  using: node20
  main: dist/index.js
