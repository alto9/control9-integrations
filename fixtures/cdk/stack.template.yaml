AWSTemplateFormatVersion: "2010-09-09"
Resources:
  ExampleTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: example-table
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
